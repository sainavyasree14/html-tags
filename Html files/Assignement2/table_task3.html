<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seminar Table</title>
    <style>
        table {
            border-collapse: collapse;
            text-align: center;
            margin: 20px;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
        }
    </style>
</head>
<body>

<table>
    <!-- Header -->
    <tr>
        <th rowspan="3">Day</th>
        <th colspan="3">Seminar</th>
    </tr>
    <tr>
        <th colspan="2">Schedule</th>
        <th rowspan="2">Topic</th>
    </tr>
    <tr>
        <th>Begin</th>
        <th>End</th>
    </tr>

    <!-- Monday -->
    <tr>
        <td rowspan="2">Monday</td>
        <td rowspan="2" bgcolor="lightyellow">8:00 a.m</td>
        <td rowspan="2" bgcolor="lavender">5:00 p.m</td>
        <td>Introduction to XML</td>
    </tr>
    <tr>
        <td>Validity: DTD and Relax NG</td>
    </tr>

    <!-- Tuesday -->
<tr>
    <td rowspan="3">Tuesday</td>
    <td bgcolor="lightyellow">8:00 a.m</td>
    <td bgcolor="lightyellow">11:00 a.m</td>
    <td rowspan="2">XPath</td>
</tr>
<tr>
    <td bgcolor="lightyellow">11:00 a.m</td>
    <td bgcolor="lightgreen">2:00 p.m</td>
</tr>
<tr>
    <td bgcolor="lightgreen">2:00 p.m</td>
    <td bgcolor="lavender">5:00 p.m</td>
    <td>XSL Transformations</td>
</tr>
    <!-- Wednesday -->
    <tr>
        <td>Wednesday</td>
        <td bgcolor="lightyellow">8:00 a.m</td>
        <td bgcolor="lightgreen">12:00 p.m</td>
        <td>XSL Formatting Objects</td>
    </tr>

</table>

</body>
</html>
