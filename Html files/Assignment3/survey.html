<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <fieldset>
            <label for="username" >USERNAME</label>
            <input type="text" id="username" required placeholder="enter your username"><br><br>
            <label for="feedback">FEEDBACK</label>
            <textarea></textarea><br><br>
            <label for="rating">RATING</label>
            <input type="radio" id="rating" name="rating" value="1">1
            <input type="radio" id="rating" name="rating" value="2">2
            <input type="radio" id="rating" name="rating" value="3">3
            <input type="radio" id="rating" name="rating" value="4">4
            <input type="radio" id="rating" name="rating" value="5">5 <br><br>
            <label for="fav tech">Favourite Technology</label>
            <select>
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="js">JS</option>
                <option value="mongodb">MongoDB</option>
                <option value="reactjs">Reactjs</option>
            </select><br><br>
            <label for="subscribe">Subscribe:</label>
            <div class="checkbox-group">
                <label>
                    <input type="checkbox">Subscribe to updates
                </label><br><br>
            </div>
            <button type="submit">Submit</button>
        </fieldset>
    </form>
</body>
</html>
