<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
    <style>
        form{
            height=100vh;
            width=100vw;
            border-radius: 10px 50px;
            background-image: url(https://www.pixelstalk.net/wp-content/uploads/image11/Aesthetic-Rainbow-gradient-background.jpg);
            background-repeat: calc(2);
            background-size: auto;
        }
        fieldset{
            border-none;
            backdrop-filter: blur(100px);
            margin: 20px;
            padding:30px;
            border-radius:10px 40px;
            box-shadow: 10px 5px 10px whitesmoke;
        }
        label{
            color:aliceblue;
            font-size: 20px;
            font-family:;
            font-style:normal;
            font-weight: bold;
        }
        button{
            padding:10px 30px;
            background-color:ivory;
            font-weight: bold;
            font-style: italic;
            font-family: 'Times New Roman', Times, serif;
            border-radius:8px;
        }
        h1{
            text-align:center;
            color:blanchedalmond;
            background-image: linear-gradient(plum,hotpink);
            background-clip:text;
            font-size:30px;

        }

    </style>
</head>
<body>
    <form action="">
        <fieldset>
            <h1 align="center">Job Application Form</h1>
            <label for="fname"> First Name:</label>
            <input type="text" id="fname" maxlength="8" minlength="5" required placeholder="enter your first name:"> <br><br>
            <label for="lname"> Last name: </label>
            <input type="text" id="lname" maxlength="6" minlenth="3" placeholder="enter your last name:"> <br> <br>
            <label for="email">E-mail:</label>
            <input type="email" id="email"required placeholder="Enter your email address:"> <br><br>
            <label for="dob"> D.O.B:</label>
            <input type="datetime-local" id="dob" required placeholder="enter your date fo birth"> <br><br>
            <label for="age">Age:</label>
            <input type="number" id="age" maxlength="2" minlength="2" required placeholder="enter your age"> <br><br>
            <label for="gender">Gender:</label>
            <input type="radio" id="gender" name="gender" value="male" > Male 
            <input type="radio" name="gender" value="female" > Female
            <input type="radio" name="gender" value="Others" > Others <br><br>
            <label for="phoneno"> Phoneno:</label>
            <input type="tel" pattern="[6-9]{10} [0-9] {9} id="phoneno" required placeholder="+91"><br><br>
            <label for="state">State</label>
            <select name="choose state">
                <option value="TS">TS</option>
                <option value="AP">AP</option>
                <option value="KL">KL</option>
                <option value="AR">AR</option>
                <option value="OD">OD</option>
            </select><br><br><br>
            <label for="address">Address:</label>
            <textarea name="" rows="3" cols="30" id="address" placeholder="enter your full address"></textarea> <br><br>
            <label for="skills">Skills:</label>
            <input type="checkbox" id="skills" name="skills" value="nodejs" >Node js
            <input type="checkbox" id="skills" name="skills" value="expressjs" >Express js
            <input type="checkbox" id="skills" name="skills" value="reactjs" >React js
            <input type="checkbox" id="skills" name="skills" value="ci/cd" >CI/CD
            <input type="checkbox" id="skills" name="skills" value="mongodb" >MongoDB
            <input type="checkbox" id="skills" name="skills" value="css" >CSS <br><br>
            <label for="languages">Languages</label>
            <input type="range" >English
            <input type="range" >Hindi
            <input type="range" >Telugu
            <input type="range" >Kannada
            <input type="range" >Malayalam <br><br><br>
            <label for="resume">Resume</label>
            <input type="file" name="" accept=".pdf,.doc" id="resume" ><br><br>
    <button type="submit">submit</button>
    <button type="cancel">cancel</button>

        </fieldset>
    </form>
</body>
</html>
